<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A84FF" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data: https:; connect-src 'self' ws://127.0.0.1:5500 ws://localhost:5500;" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
  <title>CyberSuraksha</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            'primary-hover': 'var(--color-primary-hover)',
            surface: 'var(--color-surface)',
            'surface-elevated': 'var(--color-surface-elevated)',
            'on-surface': 'var(--color-on-surface)',
            'on-surface-variant': 'var(--color-on-surface-variant)',
            success: 'var(--color-success)',
            danger: 'var(--color-danger)',
            warning: 'var(--color-warning)'
          },
          borderRadius: { xl: '16px', '2xl': '20px' }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="./css/tokens.css" />
</head>
<body class="bg-[var(--color-bg)] text-on-surface antialiased selection:bg-primary/20">
  <header class="fixed top-0 left-0 right-0 z-50">
    <div class="max-w-6xl mx-auto px-4 pt-4">
      <div class="bg-surface/80 border border-white/10 rounded-2xl px-4 py-3 flex items-center justify-between backdrop-blur-xl">
        <div class="flex items-center gap-2">
          <i class="ri-shield-star-line text-primary text-lg"></i>
          <span id="app-title" class="text-sm font-semibold">CyberSuraksha</span>
        </div>
        <div class="flex items-center gap-2">
          <button id="about-btn" aria-label="About" class="w-10 h-10 rounded-xl bg-surface-elevated border border-white/10 flex items-center justify-center text-lg">
            <i class="ri-information-line"></i>
          </button>
          <button id="settings-btn" aria-label="Settings" class="relative w-10 h-10 rounded-xl bg-surface-elevated border border-white/10 flex items-center justify-center text-lg">
            <i class="ri-settings-3-line"></i>
            <span id="settings-dot" class="absolute top-0 right-0 translate-x-1/4 -translate-y-1/4 w-2.5 h-2.5 rounded-full bg-danger border border-surface"></span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main id="app" class="max-w-6xl mx-auto px-4 pt-24 pb-28 min-h-screen"></main>
  <footer id="app-footer-note" class="max-w-6xl mx-auto px-4 pb-24 text-xs text-on-surface-variant">
    CyberSuraksha helps users practice safe decisions through guided scam simulations.
  </footer>

  <nav class="fixed bottom-0 left-0 right-0 bg-surface/90 backdrop-blur-xl border-t border-white/10 safe-bottom z-40">
    <div class="max-w-6xl mx-auto flex justify-around items-center h-16">
      <a href="#/home" data-nav="home" class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors text-primary"><i class="ri-home-5-line text-xl"></i><span class="text-xs">Home</span></a>
      <a href="#/simulators" data-nav="simulators" class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors"><i class="ri-shield-check-line text-xl"></i><span class="text-xs">Simulators</span></a>
      <a href="#/quiz" data-nav="quiz" class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors"><i class="ri-questionnaire-line text-xl"></i><span class="text-xs">Quiz</span></a>
      <a href="#/emergency" data-nav="emergency" class="flex flex-col items-center gap-1 text-on-surface-variant hover:text-primary transition-colors"><i class="ri-alarm-warning-line text-xl"></i><span class="text-xs">Emergency</span></a>
    </div>
  </nav>
  <button id="install-pwa-btn" class="hidden fixed left-1/2 -translate-x-1/2 md:left-auto md:translate-x-0 md:right-6 bottom-20 md:bottom-6 z-50 px-4 py-2 rounded-full bg-primary text-white text-sm font-semibold shadow-2xl border border-white/20">
    <i class="ri-download-2-line mr-1"></i><span id="install-pwa-label">Install App</span>
  </button>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
